name: VLA Integration Tests

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run CI Pipeline
        run: |
          # This script handles both the Pytest execution and the Smoke test execution.
          # It enforces the Merge Blocking Rule (Part 6) internally by exiting with code 1 if any step fails.
          python ci/run_pipeline.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ci-artifacts
          path: ci_artifacts/
          retention-days: 7
